name: Run Pipeline

on:
  workflow_dispatch:
    inputs:
      client_id:
        description: "Client ID"
        required: true
        type: string
      brand_name:
        description: "Brand name"
        required: false
        type: string
      issue_number:
        description: "GitHub Issue Number"
        required: false
        type: string
      issue_url:
        description: "GitHub Issue URL"
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      CLIENT_ID: ${{ inputs.client_id }}
      BRAND_NAME: ${{ inputs.brand_name }}
      ISSUE_NUMBER: ${{ inputs.issue_number }}
      ISSUE_URL: ${{ inputs.issue_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Print inputs
        run: |
          echo "CLIENT_ID=${CLIENT_ID}"
          echo "BRAND_NAME=${BRAND_NAME}"
          echo "ISSUE_NUMBER=${ISSUE_NUMBER}"
          echo "ISSUE_URL=${ISSUE_URL}"

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        run: npm run build

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel Environment (optional but recommended)
        run: |
          vercel pull --yes --environment=preview --token "${VERCEL_TOKEN}" --cwd apps/web

      - name: Deploy to Vercel (Preview)
        id: vercel_deploy
        run: |
          DEPLOY_URL=$(vercel deploy --token "${VERCEL_TOKEN}" --cwd apps/web)
          echo "DEPLOY_URL=${DEPLOY_URL}"
          echo "deploy_url=${DEPLOY_URL}" >> $GITHUB_OUTPUT

      - name: Comment on GitHub Issue (optional)
        if: ${{ inputs.issue_number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const brand = process.env.BRAND_NAME || "(not provided)";
            const clientId = process.env.CLIENT_ID;
            const issueUrl = process.env.ISSUE_URL || "(not provided)";
            const deployUrl = "${{ steps.vercel_deploy.outputs.deploy_url }}";

            const body = [
              "✅ Site créé et déployé (Preview)",
              "",
              `**Brand:** ${brand}`,
              `**Client ID:** ${clientId}`,
              `**Issue URL:** ${issueUrl}`,
              "",
              `🚀 **Preview URL:** ${deployUrl}`
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body
            });
