name: Run Pipeline

permissions:
  contents: read
  issues: write

on:
  workflow_dispatch:
    inputs:
      client_id:
        description: "Client ID"
        required: true
        type: string
      brand_name:
        description: "Brand name"
        required: false
        type: string
      issue_number:
        description: "Issue Number"
        required: false
        type: string
      issue_url:
        description: "Issue URL"
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Print inputs
        run: |
          echo "Client ID: ${{ inputs.client_id }}"
          echo "Brand name: ${{ inputs.brand_name }}"
          echo "Issue Number: ${{ inputs.issue_number }}"
          echo "Issue URL: ${{ inputs.issue_url }}"

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        run: npm run build

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Deploy to Vercel
        id: vercel_deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOY_URL=$(vercel deploy --token "${VERCEL_TOKEN}")
          echo "DEPLOY_URL=${DEPLOY_URL}"
          echo "deploy_url=${DEPLOY_URL}" >> $GITHUB_OUTPUT

      - name: Comment on GitHub Issue
        if: ${{ inputs.issue_number != '' }}
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.vercel_deploy.outputs.deploy_url }}
        with:
          script: |
            const issueNumber = Number("${{ inputs.issue_number }}");

            const body = `
            Site créé et déployé.

            Brand: ${{ inputs.brand_name }}
            Client ID: ${{ inputs.client_id }}

            🚀 Preview URL:
            ${process.env.DEPLOY_URL}
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: body
            });
