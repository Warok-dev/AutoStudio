name: Run Pipeline

permissions:
  contents: write
  issues: write

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue Number (used as client_id)"
        required: true
        type: string
      brand_name:
        description: "Brand name"
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set client id
        id: cid
        run: |
          CLIENT_ID="${{ inputs.issue_number }}"
          echo "client_id=$CLIENT_ID" >> $GITHUB_OUTPUT
          echo "Client ID = $CLIENT_ID"

      - name: Verify brief exists
        id: brief
        run: |
          CLIENT_ID="${{ steps.cid.outputs.client_id }}"
          BRIEF_PATH="clients/$CLIENT_ID/brief.md"

          echo "Looking for brief at: $BRIEF_PATH"

          if [ ! -f "$BRIEF_PATH" ]; then
            echo "❌ Brief not found."
            echo "Existing clients:"
            ls -la clients || true
            exit 1
          fi

          echo "✅ Brief found"
          head -n 20 "$BRIEF_PATH"

          echo "brief_path=$BRIEF_PATH" >> $GITHUB_OUTPUT

      - name: Copy brief into web public folder
        run: |
          CLIENT_ID="${{ steps.cid.outputs.client_id }}"
          mkdir -p "apps/web/public/clients/$CLIENT_ID"
          cp "${{ steps.brief.outputs.brief_path }}" "apps/web/public/clients/$CLIENT_ID/brief.md"

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Publish brief for client ${{ steps.cid.outputs.client_id }}"
          git push

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Vercel Pull
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull \
            --yes \
            --environment=production \
            --token "$VERCEL_TOKEN" \
            --scope "$VERCEL_ORG_ID" \
            --cwd apps/web

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          cd apps/web
          URL=$(vercel deploy --prod --yes \
            --token "$VERCEL_TOKEN" \
            --scope "$VERCEL_ORG_ID")

          echo "deploy_url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to $URL"

      - name: Comment on GitHub Issue
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
          CLIENT_ID: ${{ steps.cid.outputs.client_id }}
        with:
          script: |
            const issueNumber = Number(process.env.CLIENT_ID);

            const body = `
            ✅ Site généré et déployé

            Client ID: ${process.env.CLIENT_ID}
            Brand: ${{ inputs.brand_name }}

            🚀 Site:
            ${process.env.DEPLOY_URL}

            📄 Brief:
            ${process.env.DEPLOY_URL}/clients/${process.env.CLIENT_ID}/brief.md
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });
