name: Run Pipeline

on:
  workflow_dispatch:
    inputs:
      client_id:
        description: "Client ID"
        required: true
        type: string
      brand_name:
        description: "Brand name"
        required: false
        type: string
      issue_number:
        description: "GitHub Issue Number (optional)"
        required: false
        type: string
      issue_url:
        description: "GitHub Issue URL (optional)"
        required: false
        type: string
      deploy_prod:
        description: "Deploy to PRODUCTION (auto-studio-two.vercel.app)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Print inputs
        run: |
          echo "Client ID: ${{ inputs.client_id }}"
          echo "Brand name: ${{ inputs.brand_name }}"
          echo "Issue number: ${{ inputs.issue_number }}"
          echo "Issue URL: ${{ inputs.issue_url }}"
          echo "Deploy PROD: ${{ inputs.deploy_prod }}"

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        run: npm run build

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      # PREVIEW deploy (par défaut)
      - name: Deploy to Vercel (Preview)
        if: ${{ inputs.deploy_prod == false }}
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(vercel deploy --yes --token "$VERCEL_TOKEN")
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
          echo "Preview URL: $DEPLOY_URL"

      # PRODUCTION deploy (met à jour auto-studio-two.vercel.app)
      - name: Deploy to Vercel (Production)
        if: ${{ inputs.deploy_prod == true }}
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(vercel deploy --prod --yes --token "$VERCEL_TOKEN")
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
          echo "Production URL: $DEPLOY_URL"

      # Commenter l'issue (optionnel)
      - name: Comment on GitHub Issue (optional)
        if: ${{ inputs.issue_number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = Number("${{ inputs.issue_number }}");
            const issue_url = "${{ inputs.issue_url }}";
            const brand = "${{ inputs.brand_name }}";
            const clientId = "${{ inputs.client_id }}";
            const deployUrl = process.env.DEPLOY_URL || "";

            const body =
              `✅ Site créé et déployé.\n\n` +
              (brand ? `**Brand:** ${brand}\n` : "") +
              `**Client ID:** ${clientId}\n` +
              (deployUrl ? `**URL:** ${deployUrl}\n` : "") +
              (issue_url ? `\nIssue: ${issue_url}\n` : "");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });
