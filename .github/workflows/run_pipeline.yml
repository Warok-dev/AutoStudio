name: Run Pipeline

permissions:
  contents: write
  issues: write

on:
  workflow_dispatch:
    inputs:
      client_id:
        description: "Client ID"
        required: true
        type: string
      brand_name:
        description: "Brand name"
        required: false
        type: string
      issue_number:
        description: "Issue Number"
        required: false
        type: string
      issue_url:
        description: "Issue URL"
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Print inputs
        run: |
          echo "Client ID (raw): ${{ inputs.client_id }}"
          echo "Brand name: ${{ inputs.brand_name }}"
          echo "Issue number: ${{ inputs.issue_number }}"

      # ---------------------------------------------------
      # Sanitize client_id (remove / : space etc)
      # ---------------------------------------------------
      - name: Sanitize client_id
        id: cid
        shell: bash
        run: |
          RAW="${{ inputs.client_id }}"
          SAFE="$(echo "$RAW" | tr '/: ' '---' | tr -cd 'A-Za-z0-9._-')"

          echo "RAW=$RAW"
          echo "SAFE=$SAFE"

          echo "safe_client_id=$SAFE" >> $GITHUB_OUTPUT

      # ---------------------------------------------------
      # Automatically find the correct brief
      # ---------------------------------------------------
      - name: Find brief automatically
        id: brief
        shell: bash
        run: |
          RAW="${{ inputs.client_id }}"
          BRAND="${{ inputs.brand_name }}"

          if [ -z "$BRAND" ]; then
            BRAND="$(echo "$RAW" | awk -F'/' '{print $1}' | sed 's/[[:space:]]*$//')"
          fi

          echo "RAW=$RAW"
          echo "BRAND=$BRAND"

          if [ ! -d "clients/$BRAND" ]; then
            echo "❌ Brand folder not found: clients/$BRAND"
            echo "Available folders:"
            ls -la clients || true
            exit 1
          fi

          echo "Searching briefs under clients/$BRAND"

          mapfile -t BRIEFS < <(find "clients/$BRAND" -type f -name "brief.md" | sort)

          if [ ${#BRIEFS[@]} -eq 0 ]; then
            echo "❌ No brief.md found under clients/$BRAND"
            exit 1
          fi

          echo "Found briefs:"
          printf '%s\n' "${BRIEFS[@]}"

          MATCHED=""
          RAW_DIGITS="$(echo "$RAW" | tr -cd '0-9')"

          for f in "${BRIEFS[@]}"; do
            F_DIGITS="$(echo "$f" | tr -cd '0-9')"
            if echo "$F_DIGITS" | grep -q "$RAW_DIGITS"; then
              MATCHED="$f"
              break
            fi
          done

          if [ -z "$MATCHED" ]; then
            MATCHED="${BRIEFS[-1]}"
            echo "No exact match → using latest brief:"
          else
            echo "Matched brief:"
          fi

          echo "$MATCHED"

          echo "brief_path=$MATCHED" >> $GITHUB_OUTPUT

          echo "Preview of brief:"
          head -n 40 "$MATCHED"

      # ---------------------------------------------------
      # Copy brief into website public folder
      # ---------------------------------------------------
      - name: Copy brief into web public folder
        shell: bash
        run: |
          SAFE="${{ steps.cid.outputs.safe_client_id }}"

          mkdir -p "apps/web/public/clients/$SAFE"

          cp "${{ steps.brief.outputs.brief_path }}" \
             "apps/web/public/clients/$SAFE/brief.md"

          echo "Brief copied to apps/web/public/clients/$SAFE/brief.md"

      # ---------------------------------------------------
      # Commit if files changed
      # ---------------------------------------------------
      - name: Commit changes (if any)
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "publish brief for ${{ steps.cid.outputs.safe_client_id }}"
          git push

      # ---------------------------------------------------
      # Build web app
      # ---------------------------------------------------
      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        run: npm run build

      # ---------------------------------------------------
      # Install Vercel CLI
      # ---------------------------------------------------
      - name: Install Vercel CLI
        run: npm install -g vercel

      # ---------------------------------------------------
      # Vercel Pull
      # ---------------------------------------------------
      - name: Vercel Pull
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          vercel pull \
            --yes \
            --environment=production \
            --token "$VERCEL_TOKEN" \
            --scope "$VERCEL_ORG_ID" \
            --cwd apps/web

      # ---------------------------------------------------
      # Deploy
      # ---------------------------------------------------
      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          URL=$(vercel deploy --prod --yes \
            --token "$VERCEL_TOKEN" \
            --scope "$VERCEL_ORG_ID" \
            --cwd apps/web)

          echo "deploy_url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to $URL"

      # ---------------------------------------------------
      # Comment GitHub Issue
      # ---------------------------------------------------
      - name: Comment on GitHub Issue
        if: ${{ inputs.issue_number != '' }}
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
          SAFE_CLIENT_ID: ${{ steps.cid.outputs.safe_client_id }}
        with:
          script: |
            const issueNumber = Number("${{ inputs.issue_number }}");

            const body = `
            ✅ Site généré et déployé

            Brand: ${{ inputs.brand_name }}
            Client ID: ${process.env.SAFE_CLIENT_ID}

            🚀 Site:
            ${process.env.DEPLOY_URL}

            📄 Brief:
            ${process.env.DEPLOY_URL}/clients/${process.env.SAFE_CLIENT_ID}/brief.md
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });
