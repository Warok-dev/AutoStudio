name: Run Pipeline

on:
  workflow_dispatch:
    inputs:
      client_id:
        description: "Client ID"
        required: true
        type: string
      brand_name:
        description: "Brand name"
        required: false
        type: string
      issue_number:
        description: "Issue Number"
        required: false
        type: string
      issue_url:
        description: "Issue URL"
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Print inputs
        run: |
          echo "client_id=${{ inputs.client_id }}"
          echo "brand_name=${{ inputs.brand_name }}"
          echo "issue_number=${{ inputs.issue_number }}"
          echo "issue_url=${{ inputs.issue_url }}"

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        run: npm run build

      - name: Deploy to Vercel (Preview)
        working-directory: apps/web
        run: |
          DEPLOY_URL=$(vercel deploy --token "$VERCEL_TOKEN" --yes)
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
          echo "Deployed to: $DEPLOY_URL"

      - name: Comment on GitHub Issue (optional)
        if: ${{ inputs.issue_number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = Number('${{ inputs.issue_number }}');
            const url = process.env.DEPLOY_URL;
            const brand = '${{ inputs.brand_name }}' || '';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: `✅ Site créé et déployé.\n\n🏷️ Brand: ${brand}\n🔗 Preview: ${url}\n\nClient ID: ${{ inputs.client_id }}`
            });
