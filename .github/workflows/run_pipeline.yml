name: Run Pipeline

on:
  workflow_dispatch:
    inputs:
      client_id:
        description: "Client ID"
        required: true
        type: string
      brand_name:
        description: "Brand name"
        required: false
        type: string
      issue_number:
        description: "Issue Number"
        required: false
        type: string
      issue_url:
        description: "Issue URL"
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Print inputs
        run: |
          echo "Client ID: ${{ inputs.client_id }}"
          echo "Brand name: ${{ inputs.brand_name }}"
          echo "Issue Number: ${{ inputs.issue_number }}"
          echo "Issue URL: ${{ inputs.issue_url }}"

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        run: npm run build

      - name: Install Vercel CLI
        run: npm i -g vercel

      # ✅ IMPORTANT: NO --cwd apps/web HERE (because your Vercel project Root Directory is already apps/web)
      - name: Deploy to Vercel (Preview)
        id: vercel_deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(vercel deploy --token "${VERCEL_TOKEN}")
          echo "DEPLOY_URL=${DEPLOY_URL}"
          echo "deploy_url=${DEPLOY_URL}" >> $GITHUB_OUTPUT

      - name: Comment on GitHub Issue (optional)
        if: ${{ inputs.issue_number != '' && inputs.issue_url != '' }}
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.vercel_deploy.outputs.deploy_url }}
        with:
          script: |
            const issueNumber = Number(process.env.INPUT_ISSUE_NUMBER || '${{ inputs.issue_number }}');
            const deployUrl = process.env.DEPLOY_URL;

            if (!issueNumber || !deployUrl) {
              core.warning("Missing issue_number or deploy_url, skipping comment.");
              return;
            }

            const body = [
              "✅ Site créé et déployé.",
              "",
              `**Brand:** ${'${{ inputs.brand_name }}' || 'N/A'}`,
              `**Client ID:** ${'${{ inputs.client_id }}'}`,
              "",
              `🔗 **Preview URL:** ${deployUrl}`
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });
